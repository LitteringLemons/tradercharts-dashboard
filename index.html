
<!DOCTYPE html>
<html>

<head>

<style>

body {
  background:#0d1117;
  color:white;
  font-family:Arial;
  padding:20px;
  text-align:center;
}

h1 {
  color:#58a6ff;
}

.generated {
  color:#c9d1d9;
  margin-bottom:25px;
}

.dashboard {
  width:100%;
  max-width:3200px;
  border-radius:12px;
  box-shadow:0 0 20px rgba(0,0,0,0.35);
}

.copy-btn {

  margin-top:35px;
  background:#238636;
  color:white;
  border:none;
  padding:16px 32px;
  border-radius:10px;
  font-size:20px;
  font-weight:bold;
  cursor:pointer;
}

.copy-btn:hover {
  background:#2ea043;
}

</style>

</head>

<body>

<h1>TraderCharts Dashboard</h1>

<p class="generated">
Generated:
2026-05-21T14:45:05.339Z
</p>

<img
  class="dashboard"
  src="dashboard.png?t=20260521_144505"
>

<br>

<button
  class="copy-btn"
  onclick="copyDashboard()"
>
Copy Dashboard
</button>

<script>

async function copyDashboard() {

  try {

    const response = await fetch(
      'dashboard.png?t=20260521_144505'
    );

    const blob = await response.blob();

    await navigator.clipboard.write([
      new ClipboardItem({
        [blob.type]: blob
      })
    ]);

    alert(
      'Dashboard copied to clipboard.'
    );

  } catch (err) {

    console.error(err);

    alert(
      'Copy failed. Browser may not support image clipboard access.'
    );
  }
}

</script>

</body>
